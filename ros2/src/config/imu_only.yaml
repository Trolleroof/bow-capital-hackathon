/oak:
  ros__parameters:

    #################################
    # Disable camera pipelines
    #################################

    camera:
      i_pipeline_type: RGB           # irrelevant when sensors disabled
      i_nn_type: none
      i_enable_ir: false

    pipeline_gen:
      i_enable_imu: true
      i_enable_sync: false          # IMPORTANT: prevents sensor sync buffering

    #################################
    # Disable ALL image sensors
    #################################

    rgb:
      i_disable_node: true

    left:
      i_disable_node: true

    right:
      i_disable_node: true

    stereo:
      i_disable_node: true

    depth:
      i_disable_node: true

    #################################
    # IMU SETTINGS
    #################################

    imu:
      i_acc_freq: 400
      i_gyro_freq: 400
      i_batch_report_threshold: 1   # publish immediately
      i_max_batch_reports: 1
      i_sync_method: COPY           # lowest latency
      i_enable_rotation: false

      # optional covariances
      # i_acc_cov: 0.0
      # i_gyro_cov: 0.0
      # i_rot_cov: -1.0
