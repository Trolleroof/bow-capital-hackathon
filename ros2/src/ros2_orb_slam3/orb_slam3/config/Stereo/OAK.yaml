%YAML:1.0

#--------------------------------------------------------------------------------------------
# System config
#--------------------------------------------------------------------------------------------

# When the variables are commented, the system doesn't load a previous session or not store the current one
#System.LoadAtlasFromFile: "Session_OAK_D_StereoInertial"
#System.SaveAtlasToFile: "Session_OAK_D_StereoInertial"

#--------------------------------------------------------------------------------------------
# Camera Parameters. Adjust them!
#--------------------------------------------------------------------------------------------
File.version: "1.0"

Camera.type: "KannalaBrandt8"

# LEFT camera calibration (cam1 - /oak/left/image_raw)
# EquidistantDistortedPinhole model
# projection: [fx, fy, cx, cy]
Camera1.fx: 563.6621885722552
Camera1.fy: 563.5066638138833
Camera1.cx: 639.1519459418613
Camera1.cy: 350.6553083037192

# distortion_coeffs: [k1, k2, k3, k4, k5, k6, k7, k8] (KannalaBrandt8/equidistant)
# Equidistant: [-0.0036967807164280746, 0.03518952895511124, -0.038857610999329266, 0.01478938771937784]
Camera1.k1: -0.0036967807164280746
Camera1.k2: 0.03518952895511124
Camera1.k3: -0.038857610999329266
Camera1.k4: 0.01478938771937784

Camera1.overlappingBegin: 0                                                                                                                                                                                                                                              
Camera1.overlappingEnd: 1280

# RIGHT camera calibration (cam0 - /oak/right/image_raw)
# EquidistantDistortedPinhole model
# projection: [fx, fy, cx, cy]
Camera2.fx: 565.6203184469392
Camera2.fy: 565.3123705983986
Camera2.cx: 645.1773735280826
Camera2.cy: 360.0478588106559

# distortion_coeffs: [k1, k2, k3, k4, k5, k6, k7, k8] (KannalaBrandt8/equidistant)
# Equidistant: [0.02283632500431649, -0.02564611776732695, 0.014120329175782558, -0.0020222523674134924]
Camera2.k1: 0.02283632500431649
Camera2.k2: -0.02564611776732695
Camera2.k3: 0.014120329175782558
Camera2.k4: -0.0020222523674134924

Camera2.overlappingBegin: 0
Camera2.overlappingEnd: 1280

Camera.width: 1280
Camera.height: 720

# Camera frames per second
Camera.fps: 15

# Color order of the images (0: BGR, 1: RGB. It is ignored if images are grayscale)
Camera.RGB: 0

# Stereo extrinsic: transformation from left (cam1) to right (cam0) camera
# From Kalibr T_cn_cnm1 (cam1 to cam0) - Updated with new calibration
Stereo.ThDepth: 40.0
Stereo.T_c1_c2: !!opencv-matrix
  rows: 4
  cols: 4
  dt: f
  data: [0.9999196129128729, -0.0010843422951073386, 0.012632969324581834, 0.0743898956515113,
         0.0010951653306383717, 0.9999990391894462, -0.0008498429745104092, 0.0005486842654333329,
         -0.012632035666010132, 0.0008636098481364736, 0.9999198397136448, -0.00038737211938197515,
         0.0, 0.0, 0.0, 1.0]

# Transformation from body (IMU) to left camera (cam1)
# Updated with actual IMU-camera extrinsic calibration from Kalibr
# From cam1 T_cam_imu - Updated with new calibration
IMU.T_b_c1: !!opencv-matrix
   rows: 4
   cols: 4
   dt: f
   data: [0.013913593541948242, -0.9998635391306673, 0.008905898710750091, 0.08135578428393123,
          -0.9998755665533162, -0.013846438473138902, 0.00755827700567855, 0.019618204294008734,
          -0.007433930618081288, -0.009009953313212162, -0.9999317763811986, -0.01648295708496374,
          0.0, 0.0, 0.0, 1.0]

# IMU noise parameters
# IMPORTANT: These are approximate values for OAK-D BNO086 IMU
# Calibrate using Allan variance or manufacturer datasheet for best results
# IMU noise values for BNO085 - Updated with calibrated values
IMU.NoiseGyro: 0.0004016452006548877   # Gyroscope noise density (rad/s/sqrt(Hz))
IMU.NoiseAcc: 0.0018385116734875265    # Accelerometer noise density (m/s^2/sqrt(Hz))
IMU.GyroWalk: 0.000007406689200811322  # Gyroscope random walk / bias instability (rad/s^2/sqrt(Hz))
IMU.AccWalk: 0.0007030801990783892     # Accelerometer random walk / bias instability (m/s^3/sqrt(Hz))
IMU.Frequency: 100.0 # Could also be 100hz or 400hz, not sure

#--------------------------------------------------------------------------------------------
# ORB Parameters
#--------------------------------------------------------------------------------------------

# ORB Extractor: Number of features per image
ORBextractor.nFeatures: 1000

# ORB Extractor: Scale factor between levels in the scale pyramid
ORBextractor.scaleFactor: 1.2

# ORB Extractor: Number of levels in the scale pyramid
ORBextractor.nLevels: 8

# ORB Extractor: Fast threshold
ORBextractor.iniThFAST: 20
ORBextractor.minThFAST: 7

#--------------------------------------------------------------------------------------------
# Viewer Parameters
#--------------------------------------------------------------------------------------------
Viewer.KeyFrameSize: 0.05
Viewer.KeyFrameLineWidth: 1.0
Viewer.GraphLineWidth: 0.9
Viewer.PointSize: 2.0
Viewer.CameraSize: 0.08
Viewer.CameraLineWidth: 3.0
Viewer.ViewpointX: 0.0
Viewer.ViewpointY: -0.7
Viewer.ViewpointZ: -1.8
Viewer.ViewpointF: 500.0
